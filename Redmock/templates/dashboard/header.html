<header class="bg-slate-900 text-white shadow mb-6 rounded-2xl">
    <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-4 px-4 py-4">
        <div>
            <a href="/" class="text-2xl font-bold tracking-tight">Redmock</a>
            <p class="text-sm text-slate-300">Mock test dashboard and candidate exam flow</p>
        </div>
        <nav class="flex flex-wrap gap-2 text-sm">
            <a href="/" class="rounded bg-slate-800 px-3 py-2 hover:bg-slate-700">Home</a>
            {% if request.session.company_id %}
                <a href="/dashboard/" class="rounded bg-slate-800 px-3 py-2 hover:bg-slate-700">Dashboard</a>
                <a href="/dashboard/subjects/" class="rounded bg-slate-800 px-3 py-2 hover:bg-slate-700">Subjects</a>
                <a href="/dashboard/subtitles/" class="rounded bg-slate-800 px-3 py-2 hover:bg-slate-700">Sub Titles</a>
                <a href="/dashboard/quizzes/" class="rounded bg-slate-800 px-3 py-2 hover:bg-slate-700">Quizs</a>
                <a href="/dashboard/candidates/" class="rounded bg-slate-800 px-3 py-2 hover:bg-slate-700">Candidates</a>
                <a href="/dashboard/attempts/" class="rounded bg-slate-800 px-3 py-2 hover:bg-slate-700">Attempts</a>
                <a href="/quiz/start/" class="rounded bg-emerald-600 px-3 py-2 hover:bg-emerald-500">Test Form</a>
                <a href="/dashboard/logout/" class="rounded bg-rose-600 px-3 py-2 hover:bg-rose-500">Logout</a>
            {% else %}
                <a href="/dashboard/login/" class="rounded bg-slate-800 px-3 py-2 hover:bg-slate-700">Dashboard Login</a>
            {% endif %}
        </nav>
    </div>
</header>
