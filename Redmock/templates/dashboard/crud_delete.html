{% extends "base.html" %}

{% block title %}{{ title }} | Redmock{% endblock %}

{% block content %}
<section class="mx-auto max-w-2xl rounded-2xl bg-white p-6 shadow-sm">
    <h1 class="text-2xl font-bold">{{ title }}</h1>
    <p class="mt-4 text-slate-600">Are you sure you want to delete this record?</p>
    <div class="mt-4 rounded-xl bg-slate-50 p-4 text-slate-700">
        {{ object }}
    </div>

    <form method="post" class="mt-6 flex gap-3">
        {% csrf_token %}
        <button type="submit" class="rounded-xl bg-rose-600 px-4 py-3 text-white">Delete</button>
        <a href="{% url cancel_url %}" class="rounded-xl bg-slate-200 px-4 py-3 text-slate-900">Cancel</a>
    </form>
</section>
{% endblock %}
