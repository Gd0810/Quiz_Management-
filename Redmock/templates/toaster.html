<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<style>
#toast-container {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 9999;
    display: flex;
    flex-direction: column-reverse;
    gap: .65rem;
    width: min(380px, calc(100vw - 2rem));
    pointer-events: none;
}

.t-toast {
    pointer-events: auto;
    position: relative;
    display: grid;
    grid-template-columns: 3rem 1fr auto;
    align-items: flex-start;
    gap: 0.2rem;
    border-radius: 1rem;
    overflow: hidden;
    background: #fff;
    border: 1.5px solid rgba(0,0,0,.07);
    box-shadow:
        0 4px 6px rgba(0,0,0,.04),
        0 12px 32px rgba(0,0,0,.10),
        0 2px 4px rgba(0,0,0,.04);
    animation: t-in .32s cubic-bezier(.34,1.3,.64,1) both;
    transition: box-shadow .2s ease, transform .2s ease;
}
.t-toast:hover {
    box-shadow:
        0 6px 10px rgba(0,0,0,.06),
        0 20px 40px rgba(0,0,0,.13);
    transform: translateY(-1px);
}

/* accent strip */
.t-strip {
    grid-row: 1 / -1;
    width: 100%;
    height: 100%;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 0;
}

/* icon */
.t-icon-wrap {
    width: 2rem; height: 2rem;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
}
.t-icon-wrap svg { width: 18px; height: 18px; }

/* body */
.t-body {
    padding: .875rem .5rem .875rem .875rem;
    display: grid;
    gap: .2rem;
    align-content: center;
    min-width: 0;
}
.t-title {
    font-size: .875rem;
    font-weight: 700;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.t-msg {
    font-size: .8125rem;
    line-height: 1.45;
    opacity: .8;
}

/* close */
.t-close {
    padding: .75rem .875rem .75rem .25rem;
    border: none;
    background: transparent;
    cursor: pointer;
    opacity: .4;
    transition: opacity .15s;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: .9rem;
    color: inherit;
}
.t-close:hover { opacity: .8; }
.t-close svg { width: 14px; height: 14px; }

/* progress bar */
.t-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    border-radius: 0 0 0 0;
    transform-origin: left;
    transition: transform linear;
    opacity: .6;
}

/* ── VARIANTS ── */

/* success */
.t-toast--success .t-strip   { background: linear-gradient(160deg, #0077b6, #023e8a); }
.t-toast--success .t-icon-wrap { background: rgba(255,255,255,.2); }
.t-toast--success .t-icon-wrap svg { stroke: #fff; }
.t-toast--success .t-title   { color: #03045e; }
.t-toast--success .t-msg     { color: #0077b6; }
.t-toast--success .t-progress { background: #0096c7; }

/* error */
.t-toast--error .t-strip   { background: linear-gradient(160deg, #dc2626, #991b1b); }
.t-toast--error .t-icon-wrap { background: rgba(255,255,255,.2); }
.t-toast--error .t-icon-wrap svg { stroke: #fff; }
.t-toast--error .t-title   { color: #7f1d1d; }
.t-toast--error .t-msg     { color: #b91c1c; }
.t-toast--error .t-progress { background: #ef4444; }

/* warning */
.t-toast--warning .t-strip   { background: linear-gradient(160deg, #d97706, #92400e); }
.t-toast--warning .t-icon-wrap { background: rgba(255,255,255,.2); }
.t-toast--warning .t-icon-wrap svg { stroke: #fff; }
.t-toast--warning .t-title   { color: #78350f; }
.t-toast--warning .t-msg     { color: #b45309; }
.t-toast--warning .t-progress { background: #f59e0b; }

/* info */
.t-toast--info .t-strip   { background: linear-gradient(160deg, #0096c7, #0077b6); }
.t-toast--info .t-icon-wrap { background: rgba(255,255,255,.2); }
.t-toast--info .t-icon-wrap svg { stroke: #fff; }
.t-toast--info .t-title   { color: #03045e; }
.t-toast--info .t-msg     { color: #0077b6; }
.t-toast--info .t-progress { background: #48cae4; }

/* loading */
.t-toast--loading .t-strip   { background: linear-gradient(160deg, #0096c7, #023e8a); }
.t-toast--loading .t-icon-wrap { background: rgba(255,255,255,.15); }
.t-toast--loading .t-title   { color: #03045e; }
.t-toast--loading .t-msg     { color: #0077b6; }

/* spinner ring */
.t-ring {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,.25);
    border-top-color: #fff;
    animation: t-spin .8s linear infinite;
}

/* pulse dots (loading idle animation) */
.t-dots {
    display: flex; gap: 4px; align-items: center;
}
.t-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,.85);
    animation: t-pulse 1.2s ease-in-out infinite;
}
.t-dots span:nth-child(2) { animation-delay: .2s; }
.t-dots span:nth-child(3) { animation-delay: .4s; }

@keyframes t-in {
    from { opacity: 0; transform: translateX(24px) scale(.95); }
    to   { opacity: 1; transform: translateX(0)  scale(1); }
}
@keyframes t-out {
    from { opacity: 1; transform: translateX(0) scale(1); max-height: 120px; margin-bottom: 0; }
    to   { opacity: 0; transform: translateX(24px) scale(.95); max-height: 0; margin-bottom: -.65rem; }
}
@keyframes t-spin   { to { transform: rotate(360deg); } }
@keyframes t-pulse  { 0%,100% { transform: scale(.6); opacity:.4; } 50% { transform: scale(1); opacity:1; } }
</style>

<script>
(function () {
    "use strict";

    var container = document.getElementById('toast-container');
    if (!container) return;

    /* ── SVG icons (inline, no external deps) ── */
    var ICONS = {
        success: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
        error:   '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>',
        warning: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>',
        info:    '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01"/></svg>',
        close:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>'
    };

    function getType(tags) {
        if (!tags) return 'info';
        var t = String(tags).split(' ');
        if (t.indexOf('success') !== -1) return 'success';
        if (t.indexOf('warning') !== -1) return 'warning';
        if (t.indexOf('error')   !== -1 || t.indexOf('danger') !== -1) return 'error';
        if (t.indexOf('loading') !== -1) return 'loading';
        return 'info';
    }

    function removeToast(el) {
        if (!el || !el.parentNode) return;
        el.style.animation = 't-out .28s cubic-bezier(.4,0,.6,1) forwards';
        setTimeout(function () { el.parentNode && el.parentNode.removeChild(el); }, 280);
    }

    function createToast(type, title, message, duration) {
        type     = type    || 'info';
        var auto = (duration !== undefined) ? duration : (type === 'loading' ? 0 : 5000);

        var toast = document.createElement('div');
        toast.className = 't-toast t-toast--' + type;
        toast.setAttribute('role', type === 'error' ? 'alert' : 'status');

        /* strip */
        var strip = document.createElement('div');
        strip.className = 't-strip';
        if (type === 'loading') {
            /* animated spinner + pulse dots */
            strip.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;">'
                + '<div class="t-ring"></div>'
                + '<div class="t-dots"><span></span><span></span><span></span></div>'
                + '</div>';
        } else {
            var iconWrap = document.createElement('div');
            iconWrap.className = 't-icon-wrap';
            iconWrap.innerHTML = ICONS[type] || ICONS.info;
            strip.appendChild(iconWrap);
        }

        /* body */
        var body = document.createElement('div');
        body.className = 't-body';

        var titleEl = document.createElement('p');
        titleEl.className = 't-title';
        titleEl.textContent = title || (type.charAt(0).toUpperCase() + type.slice(1));
        body.appendChild(titleEl);

        if (message) {
            var msgEl = document.createElement('p');
            msgEl.className = 't-msg';
            msgEl.textContent = message;
            body.appendChild(msgEl);
        }

        /* close */
        var closeBtn = document.createElement('button');
        closeBtn.className = 't-close';
        closeBtn.type = 'button';
        closeBtn.setAttribute('aria-label', 'Dismiss');
        closeBtn.innerHTML = ICONS.close;
        closeBtn.addEventListener('click', function () { removeToast(toast); });

        /* progress bar */
        var bar = null;
        if (auto > 0 && type !== 'loading') {
            bar = document.createElement('div');
            bar.className = 't-progress';
            bar.style.width = '100%';
            toast.appendChild(bar);
        }

        toast.appendChild(strip);
        toast.appendChild(body);
        toast.appendChild(closeBtn);
        container.appendChild(toast);

        /* animate progress bar */
        if (bar) {
            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    bar.style.transition = 'transform ' + auto + 'ms linear';
                    bar.style.transform  = 'scaleX(0)';
                });
            });
            setTimeout(function () { removeToast(toast); }, auto);
        }

        return toast;
    }

    /* ── THE FIX: scan document on htmx:afterSettle, remove seeds immediately ── */
    function drainToastData() {
        document.querySelectorAll('.toast-data').forEach(function (el) {
            var level   = el.dataset.toastLevel  || 'info';
            var title   = el.dataset.toastTitle  || (level.charAt(0).toUpperCase() + level.slice(1));
            var message = (el.textContent || '').trim();
            el.parentNode && el.parentNode.removeChild(el);
            if (message) createToast(level, title, message);
        });
    }

    document.addEventListener('htmx:afterSettle', drainToastData);

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', drainToastData);
    } else {
        drainToastData();
    }

    /* Django server-side messages */
    [{% for message in messages %}{"level":"{{ message.tags|default:'info'|escapejs }}","title":"{{ message.tags|default:'Info'|escapejs }}","content":"{{ message|escapejs }}"}{% if not forloop.last %},{% endif %}{% endfor %}]
    .forEach(function (m) { createToast(getType(m.level), m.title, m.content); });

    /* ── Public API ── */
    window.showToast    = createToast;
    window.toastSuccess = function (t, m, d) { return createToast('success', t, m, d); };
    window.toastWarning = function (t, m, d) { return createToast('warning', t, m, d); };
    window.toastError   = function (t, m, d) { return createToast('error',   t, m, d); };
    window.toastInfo    = function (t, m, d) { return createToast('info',    t, m, d); };
    window.toastLoading = function (t, m)    { return createToast('loading', t, m, 0); };

    window.toastDone = function (toast, title, message, duration) {
        if (!toast || !toast.parentNode) return;
        /* swap to success variant in-place */
        toast.className = 't-toast t-toast--success';
        toast.querySelector('.t-title').textContent = title || 'Done';
        var strip = toast.querySelector('.t-strip');
        strip.innerHTML = '';
        var iw = document.createElement('div');
        iw.className = 't-icon-wrap';
        iw.innerHTML = ICONS.success;
        strip.appendChild(iw);
        var msgEl = toast.querySelector('.t-msg');
        if (message) {
            if (!msgEl) {
                msgEl = document.createElement('p');
                msgEl.className = 't-msg';
                toast.querySelector('.t-body').appendChild(msgEl);
            }
            msgEl.textContent = message;
        }
        var d = (duration !== undefined) ? duration : 3000;
        if (d > 0) setTimeout(function () { removeToast(toast); }, d);
    };
}());
</script>
