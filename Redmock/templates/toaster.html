<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<style>
#toast-container {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 1100;
    display: grid;
    gap: 0.85rem;
    width: min(360px, calc(100% - 2rem));
    pointer-events: none;
}
.toast {
    pointer-events: auto;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.85rem;
    align-items: flex-start;
    padding: 1rem 1rem 1rem 0.95rem;
    border-radius: 1rem;
    border: 1px solid rgba(14, 165, 233, 0.28);
    background: linear-gradient(180deg, rgba(236, 253, 255, 0.98), rgba(219, 234, 254, 0.92));
    box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
    color: #0f172a;
    overflow: hidden;
    position: relative;
    animation: toast-slide-in 0.28s ease-out;
}
.toast::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(14, 165, 233, 0.06), rgba(56, 189, 248, 0.04));
    pointer-events: none;
}
.toast__icon {
    position: relative; z-index: 1;
    width: 2.4rem; height: 2.4rem; min-width: 2.4rem;
    border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(14, 165, 233, 0.12);
    color: #0f172a;
    font-size: 1.2rem;
}
.toast__content { position: relative; z-index: 1; display: grid; gap: 0.25rem; }
.toast__title   { font-weight: 700; color: #0f172a; font-size: 0.97rem; }
.toast__message { font-size: 0.95rem; color: rgba(15,23,42,0.82); line-height: 1.45; }
.toast__close {
    position: relative; z-index: 1;
    border: none; background: transparent;
    color: rgba(15,23,42,0.65); cursor: pointer;
    padding: 0.1rem; border-radius: 999px;
    transition: transform .2s ease, color .2s ease;
    font-size: 1.1rem;
}
.toast__close:hover { transform: scale(1.08); color: rgba(15,23,42,0.92); }
.toast--success { border-color: rgba(16,185,129,0.35); }
.toast--warning { border-color: rgba(234,179,8,0.35); }
.toast--error   { border-color: rgba(239,68,68,0.35); }
.toast--info    { border-color: rgba(59,130,246,0.35); }
.toast--loading { border-color: rgba(56,189,248,0.45); }
.toast--success .toast__icon { background: rgba(16,185,129,0.16); color: #047857; }
.toast--warning .toast__icon { background: rgba(234,179,8,0.16);  color: #92400e; }
.toast--error   .toast__icon { background: rgba(239,68,68,0.16);  color: #991b1b; }
.toast--info    .toast__icon { background: rgba(59,130,246,0.16); color: #1d4ed8; }
.toast--loading .toast__icon { background: rgba(56,189,248,0.16); color: #0ea5e9; }
.toast--loading .toast__ring {
    height: 1.75rem; width: 1.75rem;
    border: 3px solid rgba(14,165,233,0.35);
    border-top-color: rgba(56,189,248,0.85);
    border-radius: 50%;
    animation: toast-spin 1s linear infinite;
}
@keyframes toast-slide-in {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
}
@keyframes toast-fade-out {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(16px); }
}
@keyframes toast-spin { to { transform: rotate(360deg); } }
</style>

<script>
(function () {
    "use strict";

    var container = document.getElementById('toast-container');
    if (!container) return;

    /* ── helpers ── */
    function getType(tags) {
        if (!tags) return 'info';
        var t = String(tags).split(' ');
        if (t.indexOf('success') !== -1) return 'success';
        if (t.indexOf('warning') !== -1) return 'warning';
        if (t.indexOf('error')   !== -1 || t.indexOf('danger') !== -1) return 'error';
        if (t.indexOf('loading') !== -1) return 'loading';
        return 'info';
    }

    function iconFor(type) {
        var icons = {
            success: 'ic:round-check-circle',
            warning: 'ic:round-warning',
            error:   'ic:round-error',
            info:    'ic:round-info',
            loading: null
        };
        return icons[type] || icons.info;
    }

    function removeToast(el) {
        if (!el || !el.parentNode) return;
        el.style.animation = 'toast-fade-out 0.24s ease forwards';
        setTimeout(function () { el.parentNode && el.parentNode.removeChild(el); }, 240);
    }

    function createToast(type, title, message, duration) {
        type     = type    || 'info';
        duration = (duration !== undefined) ? duration : (type === 'loading' ? 0 : 4500);

        var toast = document.createElement('article');
        toast.className = 'toast toast--' + type;

        /* icon */
        var iconEl = document.createElement('span');
        iconEl.className = 'toast__icon';
        if (type === 'loading') {
            iconEl.innerHTML = '<span class="toast__ring"></span>';
        } else {
            iconEl.innerHTML = '<iconify-icon icon="' + iconFor(type) + '" width="20" height="20"></iconify-icon>';
        }

        /* content */
        var content  = document.createElement('div');
        content.className = 'toast__content';
        var titleEl  = document.createElement('p');
        titleEl.className   = 'toast__title';
        titleEl.textContent = title || (type.charAt(0).toUpperCase() + type.slice(1));
        content.appendChild(titleEl);
        if (message) {
            var msgEl = document.createElement('p');
            msgEl.className   = 'toast__message';
            msgEl.textContent = message;
            content.appendChild(msgEl);
        }

        /* close */
        var closeBtn = document.createElement('button');
        closeBtn.className = 'toast__close';
        closeBtn.type      = 'button';
        closeBtn.innerHTML = '<iconify-icon icon="ic:round-close" width="18" height="18"></iconify-icon>';
        closeBtn.addEventListener('click', function () { removeToast(toast); });

        toast.appendChild(iconEl);
        toast.appendChild(content);
        toast.appendChild(closeBtn);
        container.appendChild(toast);

        if (duration > 0) {
            setTimeout(function () { removeToast(toast); }, duration);
        }
        return toast;
    }

    /*
     * ── THE FIX ────────────────────────────────────────────────────────────
     *
     * Root cause of the one-swap-late bug:
     *
     *   hx-swap="outerHTML" replaces the TARGET element itself.
     *   After the swap, evt.detail.target points to the OLD (now detached)
     *   node — the new content is already live in the DOM as a sibling/
     *   replacement.  So scanning evt.detail.target finds NOTHING (the node
     *   was replaced), and the next swap scans the then-current DOM which
     *   still holds the .toast-data-holder from the PREVIOUS response.
     *
     * Fix: always scan `document` (the live DOM) and immediately remove every
     *   .toast-data element after processing so it can never fire twice.
     *   Use htmx:afterSettle (fires after CSS transitions settle) instead of
     *   htmx:afterSwap so the new nodes are guaranteed to be in the DOM.
     * ────────────────────────────────────────────────────────────────────── */
    function drainToastData() {
        document.querySelectorAll('.toast-data').forEach(function (el) {
            var level   = el.dataset.toastLevel  || 'info';
            var title   = el.dataset.toastTitle  || (level.charAt(0).toUpperCase() + level.slice(1));
            var message = el.textContent.trim();
            /* Remove BEFORE showing — prevents double-fire if drainToastData
               is called again before the element is gone from the DOM.       */
            el.parentNode && el.parentNode.removeChild(el);
            if (message) {
                createToast(level, title, message);
            }
        });
    }

    /* Use htmx:afterSettle — new DOM is fully in place, no timing race */
    document.addEventListener('htmx:afterSettle', function () {
        drainToastData();
    });

    /* Also drain on initial page load for server-rendered errors */
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', drainToastData);
    } else {
        drainToastData();
    }

    /* ── Django messages (server-side, rendered into the template) ── */
    var djangoMessages = [
        {% for message in messages %}
        { level: getType('{{ message.tags }}'), title: '{{ message.tags|default:"Info"|escapejs }}', content: '{{ message|escapejs }}' }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ];
    djangoMessages.forEach(function (m) { createToast(m.level, m.title, m.content); });

    /* ── Public API ── */
    window.showToast    = createToast;
    window.toastSuccess = function (t, m, d) { return createToast('success', t, m, d); };
    window.toastWarning = function (t, m, d) { return createToast('warning', t, m, d); };
    window.toastError   = function (t, m, d) { return createToast('error',   t, m, d); };
    window.toastInfo    = function (t, m, d) { return createToast('info',    t, m, d); };
    window.toastLoading = function (t, m)    { return createToast('loading', t, m, 0); };
    window.toastDone    = function (toast, title, message, duration) {
        if (!toast) return;
        toast.className = 'toast toast--success';
        toast.querySelector('.toast__title').textContent = title || 'Success';
        var msgEl = toast.querySelector('.toast__message');
        if (!msgEl) {
            msgEl = document.createElement('p');
            msgEl.className = 'toast__message';
            toast.querySelector('.toast__content').appendChild(msgEl);
        }
        msgEl.textContent = message || '';
        toast.querySelector('.toast__icon').innerHTML =
            '<iconify-icon icon="ic:round-check-circle" width="20" height="20"></iconify-icon>';
        var d = (duration !== undefined) ? duration : 2200;
        if (d !== 0) { setTimeout(function () { removeToast(toast); }, d); }
    };
}());
</script>
