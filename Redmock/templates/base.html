{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Redmock{% endblock %}</title>
    <!-- Iconify for icons -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tailwind-build.css' %}">
    <script src="{% static 'js/htmx.min.js' %}"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900" style="font-family: 'Poppins', sans-serif;">
    <div class="min-h-screen">
        {% include 'toaster.html' %}
        <main class="mx-auto max-w-7xl px-4 py-8">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
