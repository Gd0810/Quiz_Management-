<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<style>
#toast-container {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 1100;
    display: grid;
    gap: 0.85rem;
    width: min(360px, calc(100% - 2rem));
    pointer-events: none;
}
.toast {
    pointer-events: auto;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.85rem;
    align-items: flex-start;
    padding: 1rem 1rem 1rem 0.95rem;
    border-radius: 1rem;
    border: 1px solid rgba(14, 165, 233, 0.28);
    background: linear-gradient(180deg, rgba(236, 253, 255, 0.98), rgba(219, 234, 254, 0.92));
    box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
    color: #0f172a;
    overflow: hidden;
    position: relative;
    animation: toast-slide-in 0.28s ease-out;
}
.toast::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(14, 165, 233, 0.06), rgba(56, 189, 248, 0.04));
    pointer-events: none;
}
.toast__icon {
    position: relative;
    z-index: 1;
    width: 2.4rem;
    height: 2.4rem;
    min-width: 2.4rem;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(14, 165, 233, 0.12);
    color: #0f172a;
    font-size: 1.2rem;
}
.toast__content {
    position: relative;
    z-index: 1;
    display: grid;
    gap: 0.25rem;
}
.toast__title {
    font-weight: 700;
    color: #0f172a;
    font-size: 0.97rem;
}
.toast__message {
    font-size: 0.95rem;
    color: rgba(15, 23, 42, 0.82);
    line-height: 1.45;
}
.toast__close {
    position: relative;
    z-index: 1;
    border: none;
    background: transparent;
    color: rgba(15, 23, 42, 0.65);
    cursor: pointer;
    padding: 0.1rem;
    border-radius: 999px;
    transition: transform 0.2s ease, color 0.2s ease;
    font-size: 1.1rem;
}
.toast__close:hover {
    transform: scale(1.08);
    color: rgba(15, 23, 42, 0.92);
}
.toast--success { border-color: rgba(16, 185, 129, 0.35); }
.toast--warning { border-color: rgba(234, 179, 8, 0.35); }
.toast--error { border-color: rgba(239, 68, 68, 0.35); }
.toast--info { border-color: rgba(59, 130, 246, 0.35); }
.toast--loading { border-color: rgba(56, 189, 248, 0.45); }
.toast--success .toast__icon { background: rgba(16, 185, 129, 0.16); color: #047857; }
.toast--warning .toast__icon { background: rgba(234, 179, 8, 0.16); color: #92400e; }
.toast--error .toast__icon { background: rgba(239, 68, 68, 0.16); color: #991b1b; }
.toast--info .toast__icon { background: rgba(59, 130, 246, 0.16); color: #1d4ed8; }
.toast--loading .toast__icon { background: rgba(56, 189, 248, 0.16); color: #0ea5e9; }
.toast--loading .toast__ring {
    height: 1.75rem;
    width: 1.75rem;
    border: 3px solid rgba(14, 165, 233, 0.35);
    border-top-color: rgba(56, 189, 248, 0.85);
    border-radius: 50%;
    animation: toast-spin 1s linear infinite;
}
@keyframes toast-slide-in {
    from { opacity: 0; transform: translateX(16px); }
    to { opacity: 1; transform: translateX(0); }
}
@keyframes toast-fade-out {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(16px); }
}
@keyframes toast-spin {
    to { transform: rotate(360deg); }
}
</style>

<script>
(function () {
    var container = document.getElementById('toast-container');
    if (!container) return;

    function getToastType(tags) {
        if (!tags) return 'info';
        tags = tags.split(' ');
        if (tags.indexOf('success') !== -1) return 'success';
        if (tags.indexOf('warning') !== -1) return 'warning';
        if (tags.indexOf('error') !== -1 || tags.indexOf('danger') !== -1) return 'error';
        if (tags.indexOf('loading') !== -1) return 'loading';
        return 'info';
    }

    function createToast(type, title, message, duration) {
        duration = duration || (type === 'loading' ? 0 : 4500);
        var toast = document.createElement('article');
        toast.className = 'toast toast--' + type;

        var iconEl = document.createElement('span');
        iconEl.className = 'toast__icon';
        if (type === 'success') {
            iconEl.innerHTML = '<iconify-icon icon="ic:round-check-circle" width="20" height="20"></iconify-icon>';
        } else if (type === 'warning') {
            iconEl.innerHTML = '<iconify-icon icon="ic:round-warning" width="20" height="20"></iconify-icon>';
        } else if (type === 'error') {
            iconEl.innerHTML = '<iconify-icon icon="ic:round-error" width="20" height="20"></iconify-icon>';
        } else if (type === 'loading') {
            iconEl.innerHTML = '<span class="toast__ring"></span>';
        } else {
            iconEl.innerHTML = '<iconify-icon icon="ic:round-info" width="20" height="20"></iconify-icon>';
        }

        var content = document.createElement('div');
        content.className = 'toast__content';
        var titleEl = document.createElement('p');
        titleEl.className = 'toast__title';
        titleEl.textContent = title || (type.charAt(0).toUpperCase() + type.slice(1));
        var messageEl = document.createElement('p');
        messageEl.className = 'toast__message';
        messageEl.textContent = message || '';
        content.appendChild(titleEl);
        if (message) content.appendChild(messageEl);

        var closeButton = document.createElement('button');
        closeButton.className = 'toast__close';
        closeButton.type = 'button';
        closeButton.innerHTML = '<iconify-icon icon="ic:round-close" width="18" height="18"></iconify-icon>';
        closeButton.addEventListener('click', function () { removeToast(toast); });

        toast.appendChild(iconEl);
        toast.appendChild(content);
        toast.appendChild(closeButton);
        container.appendChild(toast);

        if (duration > 0) {
            window.setTimeout(function () { removeToast(toast); }, duration);
        }
        return toast;
    }

    function removeToast(toast) {
        if (!toast) return;
        toast.style.animation = 'toast-fade-out 0.24s ease forwards';
        window.setTimeout(function () {
            if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 240);
    }

    window.showToast = function (type, title, message, duration) {
        return createToast(type, title, message, duration);
    };
    window.toastSuccess = function (title, message, duration) { return createToast('success', title, message, duration); };
    window.toastWarning = function (title, message, duration) { return createToast('warning', title, message, duration); };
    window.toastError = function (title, message, duration) { return createToast('error', title, message, duration); };
    window.toastInfo = function (title, message, duration) { return createToast('info', title, message, duration); };
    window.toastLoading = function (title, message) { return createToast('loading', title, message, 0); };
    window.toastDone = function (toast, title, message, duration) {
        if (!toast) return;
        toast.className = 'toast toast--success';
        toast.querySelector('.toast__title').textContent = title || 'Success';
        var msgEl = toast.querySelector('.toast__message');
        if (!msgEl) {
            msgEl = document.createElement('p');
            msgEl.className = 'toast__message';
            toast.querySelector('.toast__content').appendChild(msgEl);
        }
        msgEl.textContent = message || '';
        toast.querySelector('.toast__icon').innerHTML = '<iconify-icon icon="ic:round-check-circle" width="20" height="20"></iconify-icon>';
        if (duration !== 0) { window.setTimeout(function () { removeToast(toast); }, duration || 2200); }
    };

    var djangoMessages = [
        {% for message in messages %}
        {
            level: getToastType('{{ message.tags }}'),
            title: '{{ message.tags|default:"Info"|escapejs }}',
            content: '{{ message|escapejs }}'
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ];

    djangoMessages.forEach(function (item) {
        createToast(item.level, item.title, item.content);
    });
})();
</script>
